<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JusTaBlog - Create New Post</title>
    <script src="js/app.js" type="module"></script>
    <script src="js/index.js" type="module"></script>
    <script src="js/new.js" type="module"></script>
    <link rel="stylesheet" href="style/index.css">
</head>
<body>
<header>
    <h1>
        <a href="/">JusTaBlog</a>
    </h1>
    <nav>
        <a href="/new" class="new-post-btn">+ New</a>
        <a href="/">Home</a>
        <a href="#" id="logout-button">Logout</a>
    </nav>
</header>
<main>
    <section class="new-post">
        <div>
            <h1>Create New Post</h1>
            <p class="status-message error hidden" id="error"></p>
            <form method="POST" id="new-post-form">
                <div class="input-wrapper">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="Title" required>
                </div>
                <div class="input-wrapper">
                    <label for="body">Body</label>
                    <textarea id="body" name="body" required></textarea>
                </div>
                <div class="input-wrapper">
                    <p>Categories</p>
                    <div class="checkboxes">
                        <div class="checkbox-wrapper">
                            <label for="wildlife">Wildlife</label>
                            <input id="wildlife" type="checkbox" name="categories[]" value="0">
                        </div>
                        <div class="checkbox-wrapper">
                            <label for="animals">Animals</label>
                            <input id="animals" type="checkbox" name="categories[]" value="1">
                        </div>
                    </div>
                </div>
                <input type="submit" value="Create">
            </form>
        </div>
    </section>
</main>

<template id="checkbox-wrapper">
    <div class="checkbox-wrapper">
        <label></label>
        <input type="checkbox" name="categories[]">
    </div>
</template>

</body>
</html>
